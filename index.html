<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Booting...</title>

<style>
body {
  margin: 0;
  background: black;
  color: #39ff14;
  font-family: monospace;
  overflow: hidden;
}

/* Matrix Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* Terminal */
.terminal {
  position: relative;
  z-index: 2;
  padding: 20px;
}

/* Final screen */
#final {
  display: none;
  position: absolute;
  top: 25%;
  width: 100%;
  text-align: center;
  color: white;
  z-index: 3;
}

h1 {
  font-size: 5vw;
}

p {
  font-size: 2.5vw;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #00ff9c;
  border: none;
  cursor: pointer;
}

/* Responsive */
@media (min-width: 768px) {
  h1 { font-size: 40px; }
  p { font-size: 18px; }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal" id="terminal"></div>

<div id="final">
  <h1 id="finalName"></h1>
<p>
🎉 Access Granted! 🎉<br><br>

Today is not just another day...<br>
It’s the day a brilliant mind was born 💻✨<br><br>

You are not just my student,<br>
you are a future software engineer 🚀<br><br>

Keep learning, keep building,<br>
and never stop coding your dreams 🔥
</p>
  <button onclick="playMusic()">🎵 Play Birthday Music</button>
</div>
<audio id="music" controls style="display:none;">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<script>
// ====== CHANGE NAME HERE ======
const studentName = "Abdul Ahad";
// ==============================

// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function drawMatrix() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0a3";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix, 33);

// TERMINAL
const terminal = document.getElementById("terminal");

const lines = [
  "Booting system...",
  "Bypassing security...",
  "Decrypting data...",
  "Locating user...",
  "User found: " + studentName,
  "Injecting birthday protocol...",
  "Accessing celebration.exe...",
  "Access Granted ✔"
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    let line = document.createElement("div");

    // Highlight special lines
    if (lines[i].includes("Access Granted")) {
      line.style.color = "#00ffff"; // cyan
    }

    if (lines[i].includes(studentName)) {
      line.style.color = "#ffffff"; // white
    }

    terminal.appendChild(line);

    let text = lines[i];
    let j = 0;

    function typing() {
      if (j < text.length) {
        line.innerHTML += text.charAt(j);
        j++;
        setTimeout(typing, 25);
      } else {
        i++;
        setTimeout(typeLine, 400);
      }
    }

    typing();
  } else {
    setTimeout(showFinal, 1200);
  }
}

function showFinal() {
  document.getElementById("terminal").style.display = "none";
  const final = document.getElementById("final");
  final.style.display = "block";

  document.getElementById("finalName").innerText =
    "🎂 Happy Birthday, " + studentName + "! 🎉";

  // Try autoplay (works after user interaction)
  document.getElementById("music").play();
}

function playMusic() {
  const music = document.getElementById("music");

  music.play().then(() => {
    console.log("Music playing");
  }).catch((error) => {
    alert("Tap again to play music 🎵");
    console.log(error);
  });
}
typeLine();
</script>

</body>
</html>
